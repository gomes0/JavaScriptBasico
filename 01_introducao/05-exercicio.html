<!DOCTYPE html>
<html lang="pt-BR">
<!-- 
    Elabore uma página em HTML que demonstre o uso do JavaScript para exibir o texto 'Primeira pagina em JavaScript' 
    em uma tag de cabeçalho de nível 1 (<h1>), formatado com a fonte verdana, cor vermelha e um tamanho de cabeçalho grande.
    pesquise o atributo style da tag h1 para personalizar a fonte e a cor do texto.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Comentários</title>
</head>
<body>
    <script>
        document.write("<h1 style='font-family:verdana; color:red;'>Primeira pagina em JavaScript</h1>");
        // document.write('<h1>Primeira pagina em JavaScript</h1>');

        document.write('<h1 style="">Texto</h1>');
    </script>
</body>
</html>
