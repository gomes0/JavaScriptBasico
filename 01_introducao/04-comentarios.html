<!DOCTYPE html>
<html lang="pt-BR">
<!-- 
    - Define o idioma da página como português do Brasil
    - Acessibilidade
    - SEO (Otimização para motores de busca)
    - Tradução do site
    - etc...
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Comentários</title>
</head>
<body>
    <script>
        document.write("<h1>Hello World!!!</h1>"); //escreve conteudo dinamico na página HTML
        /*
            O comando document.write() é utilizado para escrever conteúdo dinamicamente em uma
            página HTML. Ele é comumente usado para exibir mensagens, criar elementos HTML ou 
            adicionar conteúdo a uma página web. No exemplo acima, o comando document.write() 
            está sendo usado para escrever um título "Hello World!!!" dentro de uma tag <h1> 
            na página HTML.
        */
    </script>
</body>
</html>
