<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Declaração de Variaveis</title>
</head>
<body>
    <script>
        // Usando "let" para declarar e inicializar uma variavel
        let nome = "Elias";

        // Declarando uma variavel e atribuindo um valor posteriormente
        let idade;
        idade = 99;

        // Usando "const" para declarar uma constante
        const pi = 3.1415;

        // Demonstrar no HTML
        
        // document.write("<h1>Nome: ", nome, "</h1>");
        document.write(`<h1>Nome: ${nome}</h1>`);

        // document.write("<h1>Idade: ", idade, "</h1>");
        document.write(`<h1>Idade: ${idade}</h1>`);

        // document.write("<h1>Pi: ", pi, "</h1>");
        document.write(`<h1>Pi: ${pi}</h1>`);

    </script>
</body>
</html>
