<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aninhamento de "if"</title>
</head>
<body>
    <script>
        var x = 10;
        var y = 5;
        if(x > 5) {
            if(y > 2) {
                document.write("X é maior que 5 e Y é maior que 2.");
            }
        }
    </script>
</body>
</html>
