<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"else" (Senão)</title>
</head>
<body>
    <script>
        var idade = 18;
        if (idade >= 18)
        {
            document.write("Pode Votar!");
        } else {
            document.write("Não pode votar!");
        }
    </script>
</body>
</html>
