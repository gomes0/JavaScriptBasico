<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laço de Repetição "for" para Cálculo da Tabuada</title>
</head>
<body>
    <script>
        var numero = 7;
        var resultado = "";

        for (var i = 1; i <= 10; i++) {
            resultado += numero + "x" + i + "=" + (numero * i) + "<br>";
        }

        document.write(resultado);
    </script>
</body>
</html>
