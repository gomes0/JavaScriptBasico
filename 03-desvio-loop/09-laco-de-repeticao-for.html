<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laço de Repetição "for" para Cálculo da Tabuada</title>
</head>
<body>
    <script>
        for(var i = 0; i < 5; i++); {
            document.write("Número: " + i + "<br>");
        }
    </script>
</body>
</html>
