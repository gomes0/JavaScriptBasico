<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintaxe Básica do "switch"</title>
</head>
<body>
    <script>
        var diaDaSemana = 3;

        switch (diaDaSemana) {
            case 1:
                document.write("Hoje é segunda-feira.");

            case 2:
                document.write("Hoje é terça-feira.");
            
            case 3:
                document.write("Hoje é quarta-feira.");

            case 4:
                document.write("Hoje é quinta-feira.");

            case 5:
                document.write("Hoje é sexrta-feira.");

            case 6:
                document.write("Hoje é sabado.");

            case 7:
                document.write("Hoje é domingo.");
            default:
                document.write("Dia inválido");
        }
    </script>
</body>
</html>
