<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"else if" (Senão Se)</title>
</head>
<body>
    <script>
        var pontuacao = 75;
        if (pontuacao >= 90)
        {
            document.write("Aprovado com distinção!");
        } else if (pontuacao >= 60) {
            document.write("Aprovado!");
        } else {
            document.write("Reprovado");
        }
    </script>
</body>
</html>
