<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores Condicionais</title>
</head>
<body>
    <script>
        var x = 10;
        var y = 5;
        if(x > y) {
            document.write("X é maior que y.");
        }
    </script>
</body>
