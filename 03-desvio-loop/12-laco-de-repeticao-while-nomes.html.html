<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laço de Repetição "while" em JavaScript</title>
</head>
<body>
    <script>
        var nome = [];
        var nome;
        var contador = 0;

        while (true) {
            nome = prompt("Digite um nome ou 'sair' para encerrar:");
            if(nome ==="sair") {
            break;
        }
        nomes.push(nome);
        contador++;
    }

    document.write("Você digitou " + contador + " nome(s). ");
    document.write("Nomes informados: ");
    for (var i = 0; i < nomes.length; i++) {
        document.write(nomes[i] + "<br>");
    }
    </script>
</body>
</html>
