<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laço de Repetição "while" em JavaScript</title>
</head>
<body>
    <script>
        var numeroInicial = 1;
        var numeroFinal = 5;

        while (numeroInicial <= numeroFinal) {
            document.write("Contagem: " + numeroInicial + "<br>");
            numeroInicial++;
        }
    </script>
</body>
</html>
